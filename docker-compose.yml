# Aurea — self-contained local stack.
#   docker compose up --build
# Brings up: postgres (pgvector) · redis · backend (FastAPI) · worker (agent scheduler) · frontend (Next.js)
name: aurea

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurea}
      POSTGRES_DB: ${POSTGRES_DB:-aurea}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurea} -d ${POSTGRES_DB:-aurea}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aurea}:${POSTGRES_PASSWORD:-aurea}@postgres:5432/${POSTGRES_DB:-aurea}
      REDIS_URL: redis://redis:6379/0
      AUREA_RUN_MIGRATIONS: "true"
      AUREA_RUN_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aurea}:${POSTGRES_PASSWORD:-aurea}@postgres:5432/${POSTGRES_DB:-aurea}
      REDIS_URL: redis://redis:6379/0
      AUREA_RUN_MIGRATIONS: "false"
      AUREA_RUN_SEED: "false"
      AUREA_ROLE: worker
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.atlas.worker"]

  frontend:
    build:
      context: ./frontend
      args:
        # The browser reaches the backend on the published host port.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
